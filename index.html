<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23373adf'/%3E%3Ccircle cx='12' cy='16' r='5' fill='none' stroke='white' stroke-width='2'/%3E%3Ccircle cx='20' cy='16' r='5' fill='none' stroke='white' stroke-width='2'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>FinPair</title>
    <script>
      ;(function () {
        try {
          var k = 'finpair-theme'
          var s = localStorage.getItem(k)
          var dark
          if (s === 'dark' || s === 'light') {
            dark = s === 'dark'
          } else {
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches
          }
          if (dark) document.documentElement.setAttribute('data-theme', 'dark')
          else document.documentElement.removeAttribute('data-theme')
        } catch (e) {
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
